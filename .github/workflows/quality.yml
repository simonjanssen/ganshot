name: Quality Gates

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Guard against reusing a released version
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          new=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          old=$(git show "$base:Cargo.toml" | grep -m1 '^version' | cut -d'"' -f2)
          if [ "$new" = "$old" ]; then
            echo "Version unchanged ($new); nothing to check."
            exit 0
          fi
          if git rev-parse "v$new" >/dev/null 2>&1; then
            echo "::error::Cargo.toml version bumped to $new, but tag v$new already exists. Choose an unreleased version."
            exit 1
          fi
          echo "Version bump $old -> $new is unreleased; ok to merge."

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (all features)
        run: cargo clippy --all-features --all-targets --no-deps -- -D warnings

      - name: cargo check (all features)
        run: cargo check --all-features --all-targets

      - name: cargo test (all features)
        run: cargo test --all-features --all-targets

      - name: cargo test (docs)
        run: cargo test --all-features --doc

      - name: cargo build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --all-features --no-deps --lib